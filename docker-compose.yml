services:
  mysql:
    image: mysql:8.0
    container_name: pairesume-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-pairesume123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-pai_resume}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "13306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pairesume-redis
    restart: unless-stopped
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./server
    container_name: pairesume-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: production
      SERVER_PORT: 8080
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-pai_resume}
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-pairesume123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in production}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-https://open.bigmodel.cn/api/paas/v4}
      AI_MODEL: ${AI_MODEL:-glm-5.1}
      AI_ANALYSIS_MODEL: ${AI_ANALYSIS_MODEL:-glm-4.5-air}
      AI_INTERVIEW_MODEL: ${AI_INTERVIEW_MODEL:-GLM-4-Flash}
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: ${APP_CORS:-}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      DEV_ACCOUNT_EMAIL: ${DEV_ACCOUNT_EMAIL:-}
      DEV_ACCOUNT_PASSWORD: ${DEV_ACCOUNT_PASSWORD:-}
    ports:
      - "${BACKEND_HOST_PORT:-8080}:8080"
    volumes:
      - ./config:/app/config:ro

  frontend:
    build:
      context: .
      args:
        VITE_API_BASE_URL: /api
    container_name: pairesume-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_HOST_PORT:-80}:80"

volumes:
  mysql_data:
  redis_data:
